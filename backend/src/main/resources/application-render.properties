# Render profile: default mail props favor Gmail implicit SSL on 465.
# For Brevo/SendGrid on 587 STARTTLS, set env MAIL_USE_STARTTLS=true (see MailStartTlsConfigurer) and MAIL_HOST=smtp-relay.brevo.com.
spring.config.activate.on-profile=render

# TLS terminates at Render; without this, the app may not treat requests as HTTPS (Secure session cookies).
server.forward-headers-strategy=framework

# SPA on another origin (e.g. Vercel) must get SameSite=None + Secure on JSESSIONID and XSRF-TOKEN.
# Env COOKIE_SAMESITE / COOKIE_SECURE can still override if you set them on the service.
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
app.cookies.same-site=none
app.cookies.secure=true

spring.mail.port=${MAIL_PORT:465}
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=${MAIL_PORT:465}
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
