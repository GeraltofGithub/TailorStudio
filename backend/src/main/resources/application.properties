spring.application.name=tailor-studio

# SMTP (Gmail, Brevo, etc.): set EMAIL + EMAIL_PASSWORD. For Brevo on Render use MAIL_USE_STARTTLS=true (see comments below).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${EMAIL:}
spring.mail.password=${EMAIL_PASSWORD:}
# Verified "From" at your provider (required by Brevo for inbox delivery). Defaults to EMAIL when empty.
app.mail.from=${MAIL_FROM:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=45000
spring.mail.properties.mail.smtp.timeout=45000
spring.mail.properties.mail.smtp.writetimeout=45000
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
# true = return HTTP before SMTP finishes (fast). false = wait for SMTP; failures become 503 (debug on Render).
app.mail.async-after-commit=${APP_MAIL_ASYNC_AFTER_COMMIT:true}

# Pepper for OTP hashing — set OTP_PEPPER in production (long random string).
app.otp.pepper=${OTP_PEPPER:tailor-studio-dev-otp-pepper-change-in-prod}
# INSECURE: when true, login + forgot OTP verify accepts STATIC_OTP (6 digits) without email delivery. Only for blocked-SMTP hosts; never in real production.
app.otp.static-enabled=${STATIC_OTP_ENABLED:false}
app.otp.static-code=${STATIC_OTP:}

# OTP email login / forgot password: set EMAIL + EMAIL_PASSWORD (Gmail App Password).
# Railway/Render: add the same variables to the service.
# Render provides $PORT; keep 8081 for local dev.
server.port=${PORT:8081}

# Eager init: auth / OTP paths pay no first-hit lazy bean cost (faster login & signup after deploy).
spring.main.lazy-initialization=false

# Smaller JSON over the wire (dashboard/order lists benefit a lot on free-tier bandwidth).
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript

# Load local secrets from backend/.env if present (do not commit .env)
spring.config.import=optional:file:./.env[.properties]

# MongoDB (Atlas / local)
# Put your Atlas URI in backend/.env as MONGOURI=...
spring.data.mongodb.uri=${MONGOURI:mongodb://localhost:27017/tailor-studio}
spring.data.mongodb.auto-index-creation=true
# Driver pool defaults are OK locally; on Atlas/Render these reduce tail latency under bursty traffic.
spring.data.mongodb.connection-pool.max-size=20
spring.data.mongodb.connection-pool.min-size=2
spring.data.mongodb.connection-pool.max-wait-time=10s
spring.data.mongodb.connection-pool.max-connection-idle-time=60s

# CORS (cookie-based auth; needs explicit origins)
# Use backend/.env FRONTEND_URL or override with app.cors.allowed-origins (comma-separated).
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
# Public SPA link in OTP emails (same default as CORS).
app.brand.public-url=${FRONTEND_URL:http://localhost:5173}

# Session cookies
# - Local dev (SPA http://localhost:5173 -> API http://localhost:8081): lax + secure=false is fine (same-site to API host).
# - Production SPA on another HTTPS origin (e.g. Vercel -> Render): you MUST use SameSite=None + Secure or the browser
#   will not send JSESSIONID on API fetch() — OTP verify can be 200 while /api/me and everything else is 401.
#   On Render use SPRING_PROFILES_ACTIVE=render (see application-render.properties: forward-headers + None/Secure).
#   Or SPRING_PROFILES_ACTIVE=production, or set COOKIE_SAMESITE=None and COOKIE_SECURE=true if you do not use those profiles.
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${COOKIE_SAMESITE:lax}
server.servlet.session.cookie.path=/
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}

# PhonePe Payment Gateway (UPI / cards). Leave disabled until credentials are set.
# Docs: https://developer.phonepe.com/payment-gateway/website-integration/standard-checkout/
phonepe.enabled=${PHONEPE_ENABLED:false}
phonepe.sandbox=${PHONEPE_SANDBOX:true}
phonepe.client-id=${PHONEPE_CLIENT_ID:}
phonepe.client-version=${PHONEPE_CLIENT_VERSION:1}
phonepe.client-secret=${PHONEPE_CLIENT_SECRET:}
# Public URL of this app (no trailing slash). Used for PhonePe redirect after checkout.
phonepe.redirect-base-url=${PHONEPE_REDIRECT_BASE_URL:http://localhost:8081}
phonepe.merchant-id=${PHONEPE_MERCHANT_ID:}
