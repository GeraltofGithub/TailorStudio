<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create studio — Tailor Studio</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card" style="max-width: 520px">
        <h1>Create your studio</h1>
        <p class="sub">You become the owner. You’ll get a join code to invite staff.</p>
        <div id="msg"></div>
        <form id="f">
          <div class="form-grid two">
            <div>
              <label for="businessName">Studio name</label>
              <input id="businessName" required maxlength="200" placeholder="e.g. Mohit & Mini Designer Studio" />
            </div>
            <div>
              <label for="tagline">Tagline (optional)</label>
              <input id="tagline" maxlength="300" placeholder="Short line under your name" />
            </div>
          </div>
          <div>
            <label for="address">Address</label>
            <input id="address" maxlength="500" placeholder="Street, city, PIN" />
          </div>
          <div class="form-grid two">
            <div>
              <label for="phone">Phone</label>
              <input id="phone" maxlength="50" />
            </div>
            <div>
              <label for="secondaryPhone">Alt. phone (optional)</label>
              <input id="secondaryPhone" maxlength="50" />
            </div>
          </div>
          <hr style="border: none; border-top: 1px solid var(--border); margin: 0.5rem 0" />
          <div class="form-grid two">
            <div>
              <label for="ownerName">Your name</label>
              <input id="ownerName" required maxlength="120" />
            </div>
            <div>
              <label for="email">Email (login)</label>
              <input type="email" id="email" required autocomplete="email" />
            </div>
          </div>
          <div>
            <label for="password">Password (min 8)</label>
            <input type="password" id="password" required minlength="8" maxlength="100" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%">Create studio</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login.html">Sign in</a></p>
      </div>
    </div>
    <script src="/js/api.js"></script>
    <script>
      document.getElementById('f').addEventListener('submit', async function (e) {
        e.preventDefault();
        var msg = document.getElementById('msg');
        msg.innerHTML = '';
        var body = {
          businessName: document.getElementById('businessName').value.trim(),
          tagline: document.getElementById('tagline').value.trim() || null,
          address: document.getElementById('address').value.trim() || null,
          phone: document.getElementById('phone').value.trim() || null,
          secondaryPhone: document.getElementById('secondaryPhone').value.trim() || null,
          ownerName: document.getElementById('ownerName').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        };
        var res = await TSApi.postJson('/api/auth/signup', body);
        var data = await res.json().catch(function () {
          return {};
        });
        if (res.ok) {
          msg.innerHTML = '<div class="alert alert-success">' + (data.message || 'Created.') + '</div>';
          setTimeout(function () {
            window.location.href = '/login.html';
          }, 900);
        } else {
          msg.innerHTML = '<div class="alert alert-error">' + (data.error || 'Could not create studio') + '</div>';
        }
      });
    </script>
  </body>
</html>
