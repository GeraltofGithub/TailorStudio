<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orders — Tailor Studio</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <script src="/js/api.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      function statusBadge(st) {
        var map = {
          PENDING: 'badge-pending',
          IN_PROGRESS: 'badge-progress',
          READY: 'badge-ready',
          DELIVERED: 'badge-done',
        };
        return '<span class="badge ' + (map[st] || '') + '">' + st.replace('_', ' ') + '</span>';
      }
      document.addEventListener('DOMContentLoaded', async function () {
        await TSShell.mount('orders', 'Orders', async function () {
          var r = await TSApi.get('/api/orders');
          var orders = await r.json();
          var rows = orders
            .map(function (o) {
              var bal = Number(o.totalAmount) - Number(o.advanceAmount || 0);
              return (
                '<tr><td>#' +
                o.serialNumber +
                '</td><td>' +
                TSShell.escapeHtml(o.customer.name) +
                '</td><td>' +
                o.garmentType +
                '</td><td>' +
                o.orderDate +
                '</td><td>' +
                o.deliveryDate +
                '</td><td>' +
                statusBadge(o.status) +
                '</td><td>₹ ' +
                Number(o.totalAmount).toFixed(0) +
                '</td><td>₹ ' +
                bal.toFixed(0) +
                '</td><td class="no-print" style="white-space:nowrap">' +
                '<a class="btn btn-teal btn-sm" href="/app/order.html?id=' +
                o.id +
                '">Open</a> ' +
                '<a class="btn btn-ghost btn-sm" href="/app/payments.html?id=' +
                o.id +
                '">Receipts</a></td></tr>'
              );
            })
            .join('');
          return (
            '<div class="panel"><div class="panel-header"><h2>All orders</h2><a class="btn btn-primary btn-sm" href="/app/order.html">New order</a></div>' +
            '<div class="table-wrap"><table class="data"><thead><tr><th>#</th><th>Customer</th><th>Type</th><th>Order</th><th>Delivery</th><th>Status</th><th>Total</th><th>Balance</th><th class="no-print"></th></tr></thead><tbody>' +
            (rows || '<tr><td colspan="9">No orders yet.</td></tr>') +
            '</tbody></table></div></div>'
          );
        });
      });
    </script>
  </body>
</html>
