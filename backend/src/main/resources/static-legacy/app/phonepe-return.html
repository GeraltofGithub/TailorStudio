<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment — Tailor Studio</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <script src="/js/api.js"></script>
    <div style="max-width: 480px; margin: 2rem auto; padding: 1.5rem" class="panel">
      <p id="msg" style="margin-top: 0">Confirming payment…</p>
      <p id="detail" style="color: var(--muted); font-size: 0.9rem"></p>
      <p style="margin-top: 1.25rem">
        <a href="/app/dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
        <a id="order-link" class="btn btn-primary btn-sm" href="/app/orders.html">Back to order</a>
      </p>
    </div>
    <script>
      (async function () {
        var params = new URLSearchParams(location.search);
        var orderId = params.get('orderId');
        var orderLink = document.getElementById('order-link');
        if (orderLink && orderId) orderLink.href = '/app/order.html?id=' + encodeURIComponent(orderId);
        if (!orderId) {
          document.getElementById('msg').textContent = 'Missing order in return URL.';
          return;
        }
        var r = await TSApi.postJson('/api/orders/' + orderId + '/payments/phonepe/sync', {});
        var data = await r.json().catch(function () {
          return {};
        });
        if (r.ok) {
          var adv = data.advanceAmount != null ? Number(data.advanceAmount) : null;
          var tot = data.totalAmount != null ? Number(data.totalAmount) : null;
          var bal = adv != null && tot != null ? Math.max(0, tot - adv) : null;
          if (bal !== null && bal <= 0.001) {
            document.getElementById('msg').textContent = 'Payment received. This order is fully paid.';
          } else {
            document.getElementById('msg').textContent = 'Payment status checked.';
            document.getElementById('detail').textContent =
              bal !== null && bal > 0
                ? 'Balance still due: ₹ ' +
                  bal.toFixed(2) +
                  '. If you just completed payment, wait a few seconds and open the order again, or use “Sync online payment”.'
                : '';
          }
        } else {
          document.getElementById('msg').textContent =
            (data && (data.error || data.message)) || 'Could not confirm payment.';
        }
      })();
    </script>
  </body>
</html>
