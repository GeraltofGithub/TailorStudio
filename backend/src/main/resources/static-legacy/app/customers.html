<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customers — Tailor Studio</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <script src="/js/api.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async function () {
        await TSShell.mount('customers', 'Customers', async function () {
          var q = new URLSearchParams(window.location.search).get('q') || '';
          var url = '/api/customers' + (q ? '?q=' + encodeURIComponent(q) : '');
          var r = await TSApi.get(url);
          var list = await r.json();
          var rows = list
            .map(function (c) {
              return (
                '<tr><td>' +
                TSShell.escapeHtml(c.name) +
                '</td><td>' +
                TSShell.escapeHtml(c.phone) +
                '</td><td>' +
                TSShell.escapeHtml(c.address || '—') +
                '</td><td><a class="btn btn-teal btn-sm" href="/app/customer.html?id=' +
                c.id +
                '">Profile</a></td></tr>'
              );
            })
            .join('');
          return (
            '<div class="panel" style="margin-bottom: 1rem">' +
            '<div class="panel-header"><h2>Search</h2></div>' +
            '<div style="padding: 1rem 1.25rem">' +
            '<form class="form-grid" style="display:flex; gap:0.75rem; flex-wrap:wrap; align-items:flex-end" onsubmit="location.href=\'/app/customers.html?q=\'+encodeURIComponent(document.getElementById(\'sq\').value); return false">' +
            '<div style="flex:1; min-width:200px"><label for="sq">Name or phone</label><input id="sq" value="' +
            TSShell.escapeHtml(q) +
            '" placeholder="Search…" /></div>' +
            '<button type="submit" class="btn btn-primary">Search</button>' +
            '<a class="btn btn-ghost" href="/app/customers.html">Clear</a>' +
            '</form></div></div>' +
            '<div class="panel"><div class="panel-header"><h2>All customers</h2><a class="btn btn-teal btn-sm" href="/app/customer.html">Add customer</a></div>' +
            '<div class="table-wrap"><table class="data"><thead><tr><th>Name</th><th>Phone</th><th>Address</th><th></th></tr></thead><tbody>' +
            (rows || '<tr><td colspan="4">No customers yet.</td></tr>') +
            '</tbody></table></div></div>'
          );
        });
      });
    </script>
  </body>
</html>
