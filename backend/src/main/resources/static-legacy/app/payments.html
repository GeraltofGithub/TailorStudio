<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payments — Tailor Studio</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <script src="/js/api.js"></script>
    <script src="/js/shell.js"></script>
    <script src="/js/receipt.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async function () {
        var me = await TSShell.requireAuth();
        if (!me) return;

        var studio = {
          name: me.businessName || 'Tailor Studio',
          tagline: me.tagline || '',
          phone: me.phone || '',
          address: me.address || '',
        };

        var params = new URLSearchParams(window.location.search);
        var selId = params.get('id') ? parseInt(params.get('id'), 10) : null;

        await TSShell.mount('payments', 'Payments & receipts', async function () {
          var listRes = await TSApi.get('/api/orders');
          var orders = listRes.ok ? await listRes.json() : [];

          var rows = orders
            .map(function (o) {
              var bal = Number(o.totalAmount) - Number(o.advanceAmount || 0);
              return (
                '<tr data-id="' +
                o.id +
                '"><td>#' +
                o.serialNumber +
                '</td><td>' +
                TSShell.escapeHtml(o.customer.name) +
                '</td><td>' +
                o.garmentType +
                '</td><td>₹ ' +
                Number(o.totalAmount).toFixed(0) +
                '</td><td>₹ ' +
                Number(o.advanceAmount || 0).toFixed(0) +
                '</td><td>₹ ' +
                bal.toFixed(0) +
                '</td><td class="no-print">' +
                '<a class="btn btn-teal btn-sm" href="/app/payments.html?id=' +
                o.id +
                '">Receipts</a> ' +
                '<a class="btn btn-ghost btn-sm" href="/app/order.html?id=' +
                o.id +
                '">Edit</a></td></tr>'
              );
            })
            .join('');

          return (
            '<div class="no-print" style="margin-bottom:1rem">' +
            '<p style="margin:0 0 0.75rem;color:var(--muted);font-size:0.95rem">View and print the same <strong>payment receipt</strong> and <strong>work order</strong> as on the order screen. Balances reflect saved orders — edit an order to update amounts, then open this page again or refresh.</p>' +
            '<div class="panel"><div class="panel-header"><h2>Orders & balances</h2><a class="btn btn-ghost btn-sm" href="/app/orders.html">Orders list</a></div>' +
            '<div class="table-wrap"><table class="data"><thead><tr><th>#</th><th>Customer</th><th>Garment</th><th>Total</th><th>Advance</th><th>Balance</th><th></th></tr></thead><tbody>' +
            (rows || '<tr><td colspan="7">No orders yet.</td></tr>') +
            '</tbody></table></div></div></div>' +
            '<div id="payments-detail" class="no-print" style="display:none;margin-top:1.5rem">' +
            '<div class="panel"><div class="panel-header"><h2 id="pay-head">Receipts</h2>' +
            '<div style="display:flex;gap:0.5rem;flex-wrap:wrap">' +
            '<button type="button" class="btn btn-primary btn-sm" id="btn-pay-print">Print payment receipt</button>' +
            '<button type="button" class="btn btn-teal btn-sm" id="btn-order-print">Print work order</button>' +
            '<a class="btn btn-ghost btn-sm" id="pay-edit" href="#">Edit order</a></div></div>' +
            '<p style="padding:0 1.25rem 1rem;margin:0;color:var(--muted);font-size:0.88rem">Previews load from the server. To change advance or bill amounts, use <strong>Edit order</strong>, save, then refresh this page.</p></div></div>' +
            '<div id="receipt-payment" class="receipt-sheet" style="display:none" aria-label="Payment receipt"></div>' +
            '<div id="receipt-order" class="receipt-sheet" style="display:none;margin-top:1.5rem" aria-label="Work order"></div>'
          );
        });

        var detail = document.getElementById('payments-detail');
        var rp = document.getElementById('receipt-payment');
        var ro = document.getElementById('receipt-order');
        var payHead = document.getElementById('pay-head');
        var payEdit = document.getElementById('pay-edit');

        async function loadOrder(id) {
          if (!id) return null;
          var r = await TSApi.get('/api/orders/' + id);
          if (!r.ok) return null;
          return r.json();
        }

        async function showReceiptsFor(id) {
          var order = await loadOrder(id);
          if (!order) {
            if (detail) detail.style.display = 'none';
            if (rp) rp.style.display = 'none';
            if (ro) ro.style.display = 'none';
            return;
          }
          if (detail) detail.style.display = 'block';
          if (rp) {
            rp.style.display = 'block';
            TSReceipt.renderPaymentInto(rp, studio, order);
          }
          if (ro) {
            ro.style.display = 'block';
            TSReceipt.renderOrderSlipInto(ro, studio, order);
          }
          if (payHead) payHead.textContent = 'Receipts for order #' + order.serialNumber;
          if (payEdit) payEdit.href = '/app/order.html?id=' + order.id;
        }

        if (selId) showReceiptsFor(selId);

        function currentOrderId() {
          var p = new URLSearchParams(window.location.search).get('id');
          return p ? parseInt(p, 10) : selId;
        }

        var btnPay = document.getElementById('btn-pay-print');
        var btnOrd = document.getElementById('btn-order-print');
        if (btnPay)
          btnPay.onclick = async function () {
            var id = currentOrderId();
            if (!id || !rp) return;
            var order = await loadOrder(id);
            if (!order) return;
            TSReceipt.renderPaymentInto(rp, studio, order);
            TSReceipt.printElement(rp);
          };
        if (btnOrd)
          btnOrd.onclick = async function () {
            var id = currentOrderId();
            if (!id || !ro) return;
            var order = await loadOrder(id);
            if (!order) return;
            TSReceipt.renderOrderSlipInto(ro, studio, order);
            TSReceipt.printElement(ro);
          };
      });
    </script>
  </body>
</html>
