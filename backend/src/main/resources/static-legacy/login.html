<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — Tailor Studio</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="sub">Sign in to your tailor workspace.</p>
        <div id="login-err" class="alert alert-error" style="display: none"></div>
        <form method="post" action="/login" id="login-form">
          <input type="hidden" name="_csrf" id="_csrf" />
          <div>
            <label for="username">Email</label>
            <input type="email" id="username" name="username" autocomplete="username" required />
          </div>
          <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.25rem">Sign in</button>
        </form>
        <p class="auth-footer">
          New studio? <a href="/signup.html">Create an account</a> · Staff? <a href="/join.html">Join with code</a>
        </p>
      </div>
    </div>
    <script>
      (function () {
        var m = document.cookie.match(/XSRF-TOKEN=([^;]+)/);
        if (m) document.getElementById('_csrf').value = decodeURIComponent(m[1]);
        if (new URLSearchParams(window.location.search).get('error') === '1') {
          var e = document.getElementById('login-err');
          e.style.display = 'block';
          e.textContent = 'Sign-in failed. Check your email and password, then try again.';
        }
      })();
    </script>
  </body>
</html>
