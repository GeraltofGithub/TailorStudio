# Active with: SPRING_PROFILES_ACTIVE=production (recommended on Render / any HTTPS host when the SPA is on another origin).
#
# Cross-origin cookie auth (e.g. Vercel SPA -> this API): browsers only attach JSESSIONID / XSRF-TOKEN on
# fetch(..., { credentials: 'include' }) when those cookies are SameSite=None and Secure.
# Without this, OTP verify returns 200 but /api/me, /api/orders, etc. all return 401.
server.forward-headers-strategy=framework
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
app.cookies.same-site=none
app.cookies.secure=true
